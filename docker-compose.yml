version: '3.8'

services:
  cre-backend:
    build:
      context: .
      dockerfile: CRE.Dockerfile
    restart: always
    env_file:
      - .env
    volumes:
      - ./workflow_state:/app/workflow_state
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  # Optional: Data Simulator (uncomment if you still need mock data on the internet)
  # data-simulator:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile # You would need a separate one or use node:18-alpine
  #   ports:
  #     - "3000:3000"
  #   restart: always
