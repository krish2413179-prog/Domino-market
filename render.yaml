services:
  - type: web
    name: domino-cre-backend
    runtime: docker
    dockerfilePath: CRE.Dockerfile
    plan: free # Use 'free' for the demo to avoid immediate charges
    envVars:
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: MARKET_REGISTRY_ADDRESS
        value: 0x13AdAA22517Ef23ac0F614693784BA85a561AcF7
      - key: TRADING_ENGINE_ADDRESS
        value: 0xA9953882dBfAc22a2D74bDfB4B758e7e2054202a
      - key: SETTLEMENT_MANAGER_ADDRESS
        value: 0xBe4cf606D22c249687865b7653be572Cb670879f
      - key: GEMINI_API_KEY
        sync: false
      - key: PINATA_API_KEY
        sync: false
      - key: PINATA_API_SECRET
        sync: false
      - key: PINATA_JWT
        sync: false
      - key: WORKFLOW_STATE_PATH
        value: /app/workflow_state
      - key: POLL_INTERVAL_SECONDS
        value: 300
