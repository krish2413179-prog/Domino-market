[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules"]
test = "test/foundry"
cache_path = "cache_foundry"

[profile.default.optimizer]
enabled = true
runs = 200

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 1000 }
